<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Messages | Acadia Connect</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .messages-container {
      max-width: 1200px;
      margin: 120px auto 60px;
      padding: 20px;
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 25px;
      min-height: 600px;
    }

    .conversations-list {
      background: rgba(255, 255, 255, 0.95);
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 6px 20px rgba(102, 126, 234, 0.15);
      overflow-y: auto;
      max-height: 70vh;
      border: 1px solid rgba(102, 126, 234, 0.1);
    }

    .conversations-list h2 {
      color: #667eea;
      font-size: 1.4em;
      margin-bottom: 20px;
      font-weight: 700;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .mode-toggle {
      display: flex;
      gap: 10px;
      margin-bottom: 14px;
    }

    .mode-btn {
      flex: 1;
      padding: 10px 12px;
      border-radius: 10px;
      border: 2px solid #e8e0ff;
      cursor: pointer;
      font-weight: 700;
      color: #667eea;
      background: #fff;
      transition: all 0.25s;
    }

    .mode-btn.active {
      color: #fff;
      border-color: #667eea;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.25);
    }

    .group-controls {
      display: none;
      gap: 10px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .group-controls input {
      flex: 1;
      min-width: 160px;
      padding: 10px 12px;
      border-radius: 10px;
      border: 2px solid #e0e0e0;
      font-size: 0.95em;
      transition: all 0.3s;
    }

    .group-controls input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .group-controls button {
      padding: 10px 14px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-weight: 700;
      color: #fff;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.25);
      transition: all 0.25s;
    }

    .group-controls button:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(102, 126, 234, 0.35);
    }

    .conversation-item {
      padding: 15px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s;
      margin-bottom: 10px;
      border: 2px solid transparent;
      display: flex;
      align-items: center;
      gap: 12px;
      position: relative;
    }

    .conversation-new-banner {
      position: absolute;
      top: 10px;
      right: 10px;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 0.72em;
      font-weight: 800;
      letter-spacing: 0.4px;
      color: #fff;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      box-shadow: 0 2px 8px rgba(102, 126, 234, 0.28);
    }

    .direct-search {
      margin: 10px 0 16px;
      padding: 12px;
      border-radius: 12px;
      background: rgba(102, 126, 234, 0.04);
      border: 1px solid rgba(102, 126, 234, 0.12);
    }

    .direct-search input {
      width: 100%;
      padding: 10px 12px;
      border-radius: 10px;
      border: 2px solid #e0e0e0;
      font-size: 0.95em;
      transition: all 0.25s;
      background: #fff;
    }

    .direct-search input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .search-results {
      margin-top: 10px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .search-result-item {
      padding: 12px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.96);
      border: 1px solid rgba(102, 126, 234, 0.12);
      box-shadow: 0 4px 14px rgba(102, 126, 234, 0.12);
    }

    .search-result-top {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 10px;
    }

    .search-result-info {
      min-width: 0;
      width: 100%;
    }

    .search-result-name {
      font-weight: 800;
      color: #333;
      font-size: 0.98em;
      line-height: 1.2;
      overflow-wrap: anywhere;
    }

    .search-result-meta {
      font-size: 0.84em;
      color: #777;
      margin-top: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
    }

    .search-result-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      width: 100%;
    }

    .action-btn {
      padding: 8px 10px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-weight: 800;
      font-size: 0.86em;
      color: #fff;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.25);
      transition: all 0.2s;
      white-space: nowrap;
    }

    .action-btn.secondary {
      color: #667eea;
      background: #fff;
      border: 2px solid #e8e0ff;
      box-shadow: none;
    }

    .action-btn:hover {
      transform: translateY(-1px);
    }

    .add-to-group-panel {
      margin-top: 10px;
      display: none;
      gap: 8px;
      align-items: center;
    }

    .add-to-group-panel select {
      flex: 1;
      min-width: 140px;
      padding: 9px 10px;
      border-radius: 10px;
      border: 2px solid #e0e0e0;
      font-size: 0.9em;
      background: #fff;
    }

    .add-to-group-note {
      margin-top: 8px;
      font-size: 0.85em;
      color: #777;
    }

    .conversation-item:hover {
      background: #f8f8ff;
      border-color: #e8e0ff;
    }

    .conversation-item.active {
      background: linear-gradient(135deg, #f0f0ff 0%, #f5f5ff 100%);
      border-color: #667eea;
    }

    .conversation-photo {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #667eea;
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(102, 126, 234, 0.2);
    }

    .conversation-photo-placeholder {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 1.3em;
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(102, 126, 234, 0.25);
    }

    .conversation-details {
      flex: 1;
      min-width: 0;
    }

    .conversation-name {
      font-weight: 600;
      color: #333;
      margin-bottom: 4px;
    }

    .conversation-preview {
      font-size: 0.85em;
      color: #888;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .conversation-badge {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      border-radius: 50%;
      width: 22px;
      height: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75em;
      font-weight: 700;
      flex-shrink: 0;
      box-shadow: 0 2px 6px rgba(102, 126, 234, 0.3);
    }

    .chat-window {
      background: rgba(255, 255, 255, 0.95);
      border-radius: 12px;
      box-shadow: 0 6px 20px rgba(102, 126, 234, 0.15);
      display: flex;
      flex-direction: column;
      height: 70vh;
      border: 1px solid rgba(102, 126, 234, 0.1);
    }

    .chat-header {
      padding: 20px;
      border-bottom: 2px solid #f0f0f0;
      display: flex;
      align-items: center;
      gap: 12px;
      background: linear-gradient(135deg, rgba(102, 126, 234, 0.02) 0%, rgba(118, 75, 162, 0.02) 100%);
    }

    .chat-header-photo {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #667eea;
      box-shadow: 0 2px 8px rgba(102, 126, 234, 0.2);
    }

    .chat-header-placeholder {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 1.3em;
      box-shadow: 0 2px 8px rgba(102, 126, 234, 0.25);
    }

    .chat-header-info h3 {
      color: #667eea;
      font-size: 1.2em;
      margin: 0;
    }

    .chat-header-name-link {
      color: inherit;
      text-decoration: none;
      cursor: pointer;
    }

    .chat-header-name-link:hover {
      text-decoration: underline;
    }

    .chat-header-photo-link {
      display: inline-flex;
      align-items: center;
      text-decoration: none;
      color: inherit;
      flex-shrink: 0;
    }

    .chat-header-info p {
      color: #888;
      font-size: 0.85em;
      margin: 2px 0 0 0;
    }

    .messages-area {
      flex: 1;
      padding: 25px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .message {
      display: flex;
      gap: 10px;
      max-width: 70%;
    }

    .message.sent {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .message-bubble {
      padding: 12px 16px;
      border-radius: 12px;
      word-wrap: break-word;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
    }

    .message.received .message-bubble {
      background: #f5f5ff;
      color: #333;
      border: 1px solid #e8e0ff;
    }

    .message.sent .message-bubble {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
    }

    .message-time {
      font-size: 0.7em;
      color: #999;
      margin-top: 4px;
    }

    .message-input-area {
      padding: 20px;
      border-top: 2px solid #f0f0f0;
      display: flex;
      gap: 12px;
      background: linear-gradient(135deg, rgba(102, 126, 234, 0.01) 0%, rgba(118, 75, 162, 0.01) 100%);
    }

    .message-input {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-family: 'Poppins', sans-serif;
      font-size: 0.95em;
      resize: none;
      height: 48px;
      transition: all 0.3s;
    }

    .message-input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .send-btn {
      padding: 12px 28px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s;
      font-family: 'Poppins', sans-serif;
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.25);
    }

    .send-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(102, 126, 234, 0.35);
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #999;
      text-align: center;
      padding: 40px;
    }

    .empty-state h3 {
      color: #667eea;
      margin-bottom: 10px;
      font-weight: 700;
    }

    @media (max-width: 900px) {
      .messages-container {
        grid-template-columns: 1fr;
        margin-top: 100px;
      }

      .conversations-list {
        max-height: 300px;
      }

      .chat-window {
        height: 500px;
      }
    }
  </style>
</head>

<body>
  <header>
    <h2 class="logo">Acadia Connect</h2>
    <nav class="navigation">
      <a href="browse-students.html">Find Students</a>
      <a href="suggested-connections.html" id="suggestionsLink" style="display:none;">Suggestions</a>
      <a href="messages.html" id="messagesLink" style="display:none;">Messages</a>
      <a href="resources.html">Resources</a>
      <a href="about.html">About</a>
      <a href="profile.html" id="profileLink" style="display:none;">My Profile</a>
      <button class="btnLogin-popup" id="logoutBtn" style="display:none;" onclick="handleLogout()">Logout</button>
    </nav>
  </header>

  <div class="messages-container">
    <!-- Conversations List -->
    <div class="conversations-list">
      <h2>Messages</h2>
      <div class="mode-toggle">
        <button id="directModeBtn" class="mode-btn active" onclick="setMode('direct')">Direct</button>
        <button id="groupsModeBtn" class="mode-btn" onclick="setMode('groups')">Groups</button>
      </div>

      <div class="direct-search" id="directSearch" style="display:block;">
        <input id="userSearchInput" type="text" placeholder="Search students by name, department, or country" oninput="handleUserSearch()" />
        <div id="userSearchResults" class="search-results" style="display:none;"></div>
        <div class="add-to-group-note" id="userSearchHint">Tip: use this to start a new chat or add someone to a group.</div>
      </div>

      <div class="group-controls" id="groupControls">
        <input id="groupNameInput" type="text" placeholder="Group name" />
        <button onclick="createGroup()">Create</button>
        <button onclick="joinGroup()">Join</button>
      </div>

      <div id="conversationsList">
        <div class="empty-state">
          <p>Loading conversations...</p>
        </div>
      </div>
    </div>

    <!-- Chat Window -->
    <div class="chat-window" id="chatWindow">
      <div class="empty-state">
        <h3>Select a conversation</h3>
        <p>Choose a conversation from the left to start messaging</p>
      </div>
    </div>
  </div>

  <script src="api.js"></script>
  <script>
    let currentMode = 'direct';
    let currentChatUserId = null;
    let currentChatGroupId = null;
    let conversations = [];
    let groups = [];

    let allStudentsCache = null;
    let conversationsPoll = null;

    // Load conversations on page load
    window.addEventListener('load', async () => {
      if (!isUserLoggedIn()) {
        window.location.href = 'login.html';
        return;
      }

      // Update navigation items that should only show when logged in
      const suggestionsLink = document.getElementById('suggestionsLink');
      const messagesLink = document.getElementById('messagesLink');
      const profileLink = document.getElementById('profileLink');
      const logoutBtn = document.getElementById('logoutBtn');
      if (suggestionsLink) suggestionsLink.style.display = 'block';
      if (messagesLink) messagesLink.style.display = 'block';
      if (profileLink) profileLink.style.display = 'block';
      if (logoutBtn) logoutBtn.style.display = 'inline-block';

      await setMode('direct');

      const params = new URLSearchParams(window.location.search);
      const targetUserId = params.get('userId');
      const currentUserId = getCurrentUserId();
      if (targetUserId && targetUserId !== currentUserId) {
        await startDirectMessage(targetUserId);
      }
    });

    async function setMode(mode) {
      currentMode = mode === 'groups' ? 'groups' : 'direct';
      currentChatUserId = null;
      currentChatGroupId = null;

      const directBtn = document.getElementById('directModeBtn');
      const groupsBtn = document.getElementById('groupsModeBtn');
      const groupControls = document.getElementById('groupControls');
      const directSearch = document.getElementById('directSearch');

      directBtn.classList.toggle('active', currentMode === 'direct');
      groupsBtn.classList.toggle('active', currentMode === 'groups');
      groupControls.style.display = currentMode === 'groups' ? 'flex' : 'none';
      if (directSearch) directSearch.style.display = currentMode === 'direct' ? 'block' : 'none';

      document.getElementById('chatWindow').innerHTML = `
        <div class="empty-state">
          <h3>Select a conversation</h3>
          <p>Choose one from the left to start messaging</p>
        </div>
      `;

      if (currentMode === 'direct') {
        await loadConversations();

        // Preload groups for the Add-to-Group selector.
        await loadGroupsForSelector();

        // Poll conversations so new incoming messages bubble to the top.
        if (conversationsPoll) clearInterval(conversationsPoll);
        conversationsPoll = setInterval(() => {
          if (currentMode === 'direct') loadConversations();
        }, 10000);
      } else {
        if (conversationsPoll) {
          clearInterval(conversationsPoll);
          conversationsPoll = null;
        }
        await loadGroups();
      }
    }

    async function loadGroupsForSelector() {
      try {
        const response = await fetchWithAuth('http://localhost:3001/api/groups');
        if (!response.ok) return;
        const data = await response.json();
        groups = data.groups || [];
      } catch {
        // Silent: selector will show a hint
      }
    }

    // Load all conversations
    async function loadConversations() {
      try {
        const response = await fetchWithAuth('http://localhost:3001/api/messages/conversations');
        
        if (!response.ok) {
          throw new Error(`HTTP error! status: ${response.status}`);
        }
        
        const data = await response.json();
        
        conversations = data.conversations || [];
        renderConversations();
      } catch (error) {
        console.error('Failed to load conversations:', error);
        document.getElementById('conversationsList').innerHTML = `
          <div class="empty-state">
            <p>No conversations yet</p>
            <p style="font-size: 0.9em;">Use the search above to find a student and click “Send Message”.</p>
          </div>
        `;
      }
    }

    async function loadGroups() {
      try {
        const response = await fetchWithAuth('http://localhost:3001/api/groups');
        if (!response.ok) {
          throw new Error(`HTTP error! status: ${response.status}`);
        }
        const data = await response.json();
        groups = data.groups || [];
        renderGroups();
      } catch (error) {
        console.error('Failed to load groups:', error);
        document.getElementById('conversationsList').innerHTML = `
          <div class="empty-state">
            <p>No groups yet</p>
            <p style="font-size: 0.9em;">Create or join a group above</p>
          </div>
        `;
      }
    }

    // Render conversations list
    function renderConversations() {
      if (currentMode !== 'direct') return;
      const container = document.getElementById('conversationsList');
      
      if (conversations.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <p>No conversations yet</p>
            <p style="font-size: 0.9em;">Use the search above to start a new chat.</p>
          </div>
        `;
        return;
      }

      container.innerHTML = conversations.map(conv => {
        const initial = conv.user.fullName.charAt(0).toUpperCase();
        const photoHtml = conv.user.photo 
          ? `<img src="${conv.user.photo}" alt="${conv.user.fullName}" class="conversation-photo">`
          : `<div class="conversation-photo-placeholder">${initial}</div>`;
        
        const newHtml = conv.unreadCount > 0 ? `<div class="conversation-new-banner">NEW (${conv.unreadCount})</div>` : '';
        
        const activeClass = currentChatUserId === conv.user._id ? 'active' : '';
        
        return `
          <div class="conversation-item ${activeClass}" onclick="openChat('${conv.user._id}')">
            ${photoHtml}
            <div class="conversation-details">
              <div class="conversation-name">${conv.user.fullName}</div>
              <div class="conversation-preview">${conv.lastMessage}</div>
            </div>
            ${newHtml}
          </div>
        `;
      }).join('');
    }

    function renderGroups() {
      if (currentMode !== 'groups') return;
      const container = document.getElementById('conversationsList');

      if (groups.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <p>No groups yet</p>
            <p style="font-size: 0.9em;">Create or join a group above</p>
          </div>
        `;
        return;
      }

      container.innerHTML = groups.map(g => {
        const initial = g.name.charAt(0).toUpperCase();
        const badge = g.memberCount ? `<div class="conversation-badge">${g.memberCount}</div>` : '';
        const activeClass = String(currentChatGroupId) === String(g.id) ? 'active' : '';

        return `
          <div class="conversation-item ${activeClass}" onclick="openGroupChat('${g.id}')">
            <div class="conversation-photo-placeholder">${initial}</div>
            <div class="conversation-details">
              <div class="conversation-name">${g.name}</div>
              <div class="conversation-preview">Group chat</div>
            </div>
            ${badge}
          </div>
        `;
      }).join('');
    }

    // Open chat with a user
    async function openChat(userId) {
      if (currentMode !== 'direct') return;
      currentChatUserId = userId;
      currentChatGroupId = null;
      renderConversations(); // Re-render to show active state

      try {
        const response = await fetchWithAuth(`http://localhost:3001/api/messages/conversation/${userId}`);
        const data = await response.json();
        
        renderChatWindow(data.otherUser, data.messages);

        // Clear NEW indicator for this conversation immediately.
        conversations = (conversations || []).map(c =>
          c?.user?._id === userId ? { ...c, unreadCount: 0 } : c
        );
        renderConversations();
      } catch (error) {
        console.error('Failed to load chat:', error);
        alert('Failed to load messages');
      }
    }

    function normalizeSearch(value) {
      return String(value || '').trim().toLowerCase();
    }

    async function ensureStudentsLoaded() {
      if (Array.isArray(allStudentsCache)) return allStudentsCache;
      const students = await apiCall('/profile/all', 'GET');
      allStudentsCache = Array.isArray(students) ? students : [];
      return allStudentsCache;
    }

    async function handleUserSearch() {
      const input = document.getElementById('userSearchInput');
      const results = document.getElementById('userSearchResults');
      if (!input || !results) return;

      const q = normalizeSearch(input.value);
      if (!q) {
        results.style.display = 'none';
        results.innerHTML = '';
        return;
      }

      try {
        const currentUserId = getCurrentUserId();
        const students = await ensureStudentsLoaded();
        const matches = students
          .filter(s => s && s._id && s._id !== currentUserId)
          .filter(s => {
            const name = normalizeSearch(s.fullName);
            const dept = normalizeSearch(s.department);
            const country = normalizeSearch(s.profile?.country);
            return name.includes(q) || dept.includes(q) || country.includes(q);
          })
          .slice(0, 10);

        if (matches.length === 0) {
          results.style.display = 'block';
          results.innerHTML = `<div class="search-result-item"><div class="search-result-name">No matches</div><div class="search-result-meta">Try a different name, department, or country.</div></div>`;
          return;
        }

        results.style.display = 'block';
        results.innerHTML = matches.map(s => {
          const metaParts = [s.department, s.profile?.country].filter(Boolean);
          const meta = metaParts.join(' • ') || '—';
          const safeName = escapeHtml(s.fullName || 'Student');
          const safeMeta = escapeHtml(meta);
          const addPanelId = `addToGroup_${s._id}`;
          const selectId = `groupSelect_${s._id}`;

          const groupOptions = (groups || []).length
            ? `<option value="">Select a group</option>` + (groups || []).map(g => `<option value="${String(g.id)}">${escapeHtml(g.name)}</option>`).join('')
            : `<option value="">No groups yet</option>`;

          const groupPanel = `
            <div class="add-to-group-panel" id="${addPanelId}">
              <select id="${selectId}">${groupOptions}</select>
              <button class="action-btn" onclick="event.stopPropagation(); addUserToGroup('${s._id}')">Add</button>
            </div>
          `;

          return `
            <div class="search-result-item">
              <div class="search-result-top">
                <div class="search-result-info">
                  <div class="search-result-name">${safeName}</div>
                  <div class="search-result-meta">${safeMeta}</div>
                </div>
                <div class="search-result-actions">
                  <button class="action-btn" onclick="event.stopPropagation(); startDirectMessage('${s._id}')">Send Message</button>
                  <button class="action-btn secondary" onclick="event.stopPropagation(); toggleAddToGroup('${addPanelId}')">Add to Group</button>
                </div>
              </div>
              ${groupPanel}
            </div>
          `;
        }).join('');
      } catch (error) {
        console.error('Search failed:', error);
        results.style.display = 'block';
        results.innerHTML = `<div class="search-result-item"><div class="search-result-name">Search failed</div><div class="search-result-meta">Please try again.</div></div>`;
      }
    }

    function toggleAddToGroup(panelId) {
      const el = document.getElementById(panelId);
      if (!el) return;
      const isOpen = el.style.display === 'flex';
      el.style.display = isOpen ? 'none' : 'flex';
    }

    async function addUserToGroup(userId) {
      if (!userId) return;
      const select = document.getElementById(`groupSelect_${userId}`);
      const groupId = select ? String(select.value || '') : '';
      if (!groupId) {
        alert('Select a group first');
        return;
      }

      try {
        const response = await fetchWithAuth(`http://localhost:3001/api/groups/${groupId}/members`, {
          method: 'POST',
          body: JSON.stringify({ userId })
        });
        const data = await response.json();
        if (!response.ok) {
          alert(data?.error || 'Failed to add user to group');
          return;
        }
        alert('Added to group');
      } catch (error) {
        console.error('Add to group failed:', error);
        alert('Failed to add user to group');
      }
    }

    async function startDirectMessage(userId) {
      // Ensure Direct mode is active
      if (currentMode !== 'direct') {
        await setMode('direct');
      }
      await openChat(userId);
      const input = document.getElementById('messageInput');
      if (input) input.focus();
    }

    async function openGroupChat(groupId) {
      if (currentMode !== 'groups') return;
      currentChatGroupId = groupId;
      currentChatUserId = null;
      renderGroups();

      try {
        const response = await fetchWithAuth(`http://localhost:3001/api/groups/${groupId}/messages`);
        const data = await response.json();

        if (!response.ok) {
          throw new Error(data?.error || 'Failed to load group messages');
        }

        renderGroupChatWindow(data.group, data.messages);
      } catch (error) {
        console.error('Failed to load group chat:', error);
        alert('Failed to load group messages');
      }
    }

    // Render chat window
    function renderChatWindow(otherUser, messages) {
      const chatWindow = document.getElementById('chatWindow');
      const initial = otherUser.fullName.charAt(0).toUpperCase();
      const safeName = escapeHtml(otherUser.fullName);
      const profileHref = otherUser && otherUser._id
        ? `student-detail.html?id=${encodeURIComponent(String(otherUser._id))}`
        : '';
      const nameHtml = profileHref
        ? `<a class="chat-header-name-link" href="${profileHref}">${safeName}</a>`
        : safeName;

      const rawPhotoHtml = otherUser.photo 
        ? `<img src="${otherUser.photo}" alt="${safeName}" class="chat-header-photo">`
        : `<div class="chat-header-placeholder" aria-label="${safeName}">${initial}</div>`;

      const photoHtml = profileHref
        ? `<a class="chat-header-photo-link" href="${profileHref}" aria-label="View profile">${rawPhotoHtml}</a>`
        : rawPhotoHtml;

      chatWindow.innerHTML = `
        <div class="chat-header">
          ${photoHtml}
          <div class="chat-header-info">
            <h3>${nameHtml}</h3>
            <p>${otherUser.role === 'international' ? 'International Student' : 'Local Student'}</p>
          </div>
        </div>
        <div class="messages-area" id="messagesArea">
          ${renderMessages(messages)}
        </div>
        <div class="message-input-area">
          <textarea 
            class="message-input" 
            id="messageInput" 
            placeholder="Type your message..."
            onkeypress="handleKeyPress(event)"
          ></textarea>
          <button class="send-btn" onclick="sendMessage()">Send</button>
        </div>
      `;

      // Scroll to bottom
      const messagesArea = document.getElementById('messagesArea');
      messagesArea.scrollTop = messagesArea.scrollHeight;
    }

    function renderGroupChatWindow(group, messages) {
      const chatWindow = document.getElementById('chatWindow');
      const initial = group.name.charAt(0).toUpperCase();
      const photoHtml = `<div class="chat-header-placeholder">${initial}</div>`;

      chatWindow.innerHTML = `
        <div class="chat-header">
          ${photoHtml}
          <div class="chat-header-info">
            <h3>${group.name}</h3>
            <p>Group chat</p>
          </div>
        </div>
        <div class="messages-area" id="messagesArea">
          ${renderGroupMessages(messages)}
        </div>
        <div class="message-input-area">
          <textarea 
            class="message-input" 
            id="messageInput" 
            placeholder="Type your message..."
            onkeypress="handleKeyPress(event)"
          ></textarea>
          <button class="send-btn" onclick="sendMessage()">Send</button>
        </div>
      `;

      const messagesArea = document.getElementById('messagesArea');
      messagesArea.scrollTop = messagesArea.scrollHeight;
    }

    // Render messages
    function renderMessages(messages) {
      if (messages.length === 0) {
        return '<div class="empty-state"><p>No messages yet. Start the conversation!</p></div>';
      }

      const currentUserId = getCurrentUserId();
      
      return messages.map(msg => {
        const isSent = msg.sender._id === currentUserId;
        const time = new Date(msg.createdAt).toLocaleTimeString('en-US', { 
          hour: '2-digit', 
          minute: '2-digit' 
        });

        return `
          <div class="message ${isSent ? 'sent' : 'received'}">
            <div>
              <div class="message-bubble">${msg.content}</div>
              <div class="message-time">${time}</div>
            </div>
          </div>
        `;
      }).join('');
    }

    function escapeHtml(text) {
      return String(text)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function renderGroupMessages(messages) {
      if (messages.length === 0) {
        return '<div class="empty-state"><p>No messages yet. Start the group chat!</p></div>';
      }

      const currentUserId = getCurrentUserId();

      return messages.map(msg => {
        const isSent = msg.sender._id === currentUserId;
        const time = new Date(msg.createdAt).toLocaleTimeString('en-US', {
          hour: '2-digit',
          minute: '2-digit'
        });

        const senderPrefix = isSent ? '' : `<div style="font-size: 0.78em; color: #666; margin-bottom: 4px; font-weight: 700;">${escapeHtml(msg.sender.fullName)}</div>`;

        return `
          <div class="message ${isSent ? 'sent' : 'received'}">
            <div>
              <div class="message-bubble">${senderPrefix}${escapeHtml(msg.content)}</div>
              <div class="message-time">${time}</div>
            </div>
          </div>
        `;
      }).join('');
    }

    // Send message
    async function sendMessage() {
      const input = document.getElementById('messageInput');
      const content = input.value.trim();

      if (!content) return;

      if (currentMode === 'direct') {
        if (!currentChatUserId) return;
        try {
          const response = await fetchWithAuth('http://localhost:3001/api/messages/send', {
            method: 'POST',
            body: JSON.stringify({
              receiverId: currentChatUserId,
              content: content
            })
          });

          if (response.ok) {
            input.value = '';
            openChat(currentChatUserId);
          } else {
            alert('Failed to send message');
          }
        } catch (error) {
          console.error('Send message error:', error);
          alert('Failed to send message');
        }

        return;
      }

      if (!currentChatGroupId) return;

      try {
        const response = await fetchWithAuth(`http://localhost:3001/api/groups/${currentChatGroupId}/messages`, {
          method: 'POST',
          body: JSON.stringify({
            content: content
          })
        });

        if (response.ok) {
          input.value = '';
          openGroupChat(currentChatGroupId);
        } else {
          alert('Failed to send message');
        }
      } catch (error) {
        console.error('Send message error:', error);
        alert('Failed to send message');
      }
    }

    async function createGroup() {
      const input = document.getElementById('groupNameInput');
      const name = (input.value || '').trim();
      if (!name) return;

      try {
        const response = await fetchWithAuth('http://localhost:3001/api/groups', {
          method: 'POST',
          body: JSON.stringify({ name })
        });
        const data = await response.json();

        if (!response.ok) {
          alert(data?.error || 'Failed to create group');
          return;
        }

        input.value = '';
        await loadGroups();
        if (data.group?.id) {
          openGroupChat(data.group.id);
        }
      } catch (error) {
        console.error('Create group error:', error);
        alert('Failed to create group');
      }
    }

    async function joinGroup() {
      const input = document.getElementById('groupNameInput');
      const name = (input.value || '').trim();
      if (!name) return;

      try {
        const response = await fetchWithAuth('http://localhost:3001/api/groups/join', {
          method: 'POST',
          body: JSON.stringify({ name })
        });
        const data = await response.json();

        if (!response.ok) {
          alert(data?.error || 'Failed to join group');
          return;
        }

        input.value = '';
        await loadGroups();
        if (data.group?.id) {
          openGroupChat(data.group.id);
        }
      } catch (error) {
        console.error('Join group error:', error);
        alert('Failed to join group');
      }
    }

    // Handle Enter key press
    function handleKeyPress(event) {
      if (event.key === 'Enter' && !event.shiftKey) {
        event.preventDefault();
        sendMessage();
      }
    }

    // Get current user ID from token
    function getCurrentUserId() {
      const token = localStorage.getItem('token');
      if (!token) return null;
      
      try {
        const payload = JSON.parse(atob(token.split('.')[1]));
        return payload.userId;
      } catch (error) {
        return null;
      }
    }

    // Logout handler
    function handleLogout() {
      localStorage.removeItem('token');
      window.location.href = 'index.html';
    }
  </script>
</body>
</html>
