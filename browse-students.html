<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Browse Students | Acadia Connect</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .browse-container {
      max-width: 1200px;
      margin: 140px auto 60px;
      padding: 20px;
    }

    .browse-container h1 {
      text-align: center;
      color: #fff;
      margin-bottom: 15px;
      font-size: 2.4em;
      font-weight: 700;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
    }

    .search-section {
      display: flex;
      gap: 12px;
      margin-bottom: 35px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .search-section input {
      padding: 14px 22px;
      border: 2px solid #fff;
      border-radius: 10px;
      font-size: 0.95em;
      width: 320px;
      background: rgba(255, 255, 255, 0.95);
      color: #333;
      transition: all 0.3s;
      font-weight: 500;
    }

    .search-section select {
      padding: 14px 18px;
      border: 2px solid #fff;
      border-radius: 10px;
      font-size: 0.95em;
      min-width: 220px;
      background: rgba(255, 255, 255, 0.95);
      color: #333;
      transition: all 0.3s;
      font-weight: 500;
      cursor: pointer;
    }

    .search-section select:focus {
      outline: none;
      box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.3);
      border-color: #667eea;
    }

    .search-section input:focus {
      outline: none;
      box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.3);
      border-color: #667eea;
    }

    .search-section button {
      padding: 14px 32px;
      background: #fff;
      color: #667eea;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.95em;
      transition: all 0.3s;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.15);
    }

    .search-section button:hover {
      background: #f8f8f8;
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.2);
    }

    .students-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 28px;
      margin-top: 30px;
    }

    .student-card {
      background: rgba(255, 255, 255, 0.98);
      border-radius: 14px;
      padding: 24px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
      color: #333;
      box-shadow: 0 6px 20px rgba(102, 126, 234, 0.15);
      border: 1px solid rgba(102, 126, 234, 0.1);
    }

    .student-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 14px 36px rgba(102, 126, 234, 0.25);
      background: rgba(255, 255, 255, 1);
      border-color: rgba(102, 126, 234, 0.2);
    }

    .student-photo {
      width: 130px;
      height: 130px;
      border-radius: 50%;
      object-fit: cover;
      margin: 0 auto 18px;
      border: 4px solid #667eea;
      box-shadow: 0 6px 16px rgba(102, 126, 234, 0.2);
    }

    .student-name {
      font-size: 1.35em;
      font-weight: 700;
      margin-bottom: 7px;
      color: #667eea;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .student-role {
      font-size: 0.85em;
      color: #888;
      margin-bottom: 14px;
      letter-spacing: 0.5px;
      font-weight: 500;
    }

    .student-info {
      font-size: 0.92em;
      margin: 8px 0;
      color: #555;
      line-height: 1.4;
    }

    .student-info strong {
      color: #667eea;
      font-weight: 600;
    }

    .student-interests {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid #f0f0f0;
      min-height: 30px;
    }

    .interest-tag {
      display: inline-block;
      background: linear-gradient(135deg, #f0f0ff 0%, #f5f5ff 100%);
      color: #667eea;
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 0.82em;
      margin: 4px 4px 0 0;
      font-weight: 500;
      border: 1px solid #d0c7ff;
    }

    .view-btn {
      margin-top: 18px;
      padding: 12px 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s;
      width: 100%;
      font-size: 0.95em;
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.25);
    }

    .view-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(102, 126, 234, 0.35);
    }

    .no-students {
      text-align: center;
      color: #fff;
      font-size: 1.3em;
      padding: 40px;
    }

    .loading {
      text-align: center;
      color: #fff;
      font-size: 1.1em;
      padding: 40px;
    }

    .filters {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-bottom: 35px;
      flex-wrap: wrap;
    }

    .filter-btn {
      padding: 10px 20px;
      background: rgba(255, 255, 255, 0.15);
      color: #fff;
      border: 2px solid #fff;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.92em;
      transition: all 0.3s;
      font-weight: 500;
    }

    .filter-btn:hover {
      background: rgba(255, 255, 255, 0.25);
      transform: translateY(-2px);
    }

    .filter-btn.active {
      background: #fff;
      color: #667eea;
      box-shadow: 0 4px 12px rgba(255, 255, 255, 0.3);
      font-weight: 600;
      border-color: #667eea;
    }

    @media (max-width: 768px) {
      .students-grid {
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      }

      .browse-container h1 {
        font-size: 1.8em;
      }

      .search-section input {
        width: 100%;
      }
    }
  </style>
</head>

<body class="page-home">

  <header>
    <h2 class="logo">Acadia Connect</h2>
    <nav class="navigation">
      <a href="browse-students.html">Find Students</a>
      <a href="suggested-connections.html" id="suggestionsLink" style="display:none;">Suggestions</a>
      <a href="messages.html" id="messagesLink" style="display:none;">Messages</a>
      <a href="resources.html">Resources</a>
      <a href="about.html">About</a>
      <a href="profile.html" id="profileLink" style="display:none;">My Profile</a>
      <a href="#" id="logoutBtn" style="display:none;">Logout</a>
      <a href="login.html" class="btnLogin-popup" id="loginBtn">Login</a>
    </nav>
  </header>

  <main class="browse-container">
    <h1>🎓 Find Your People</h1>
    <p style="text-align: center; color: #fff; font-size: 1.1em; margin-bottom: 30px;">
      Connect with awesome students like you. Whether you're looking for study buddies, hangout friends, or just want to explore the campus together!
    </p>

    <div class="search-section">
      <input type="text" id="searchInput" placeholder="🔍 Search by name, department, interests...">
      <select id="countryFilter" aria-label="Filter by country">
        <option value="all">🌎 All Countries</option>
      </select>
      <select id="departmentFilter" aria-label="Filter by department">
        <option value="all">🏫 All Departments</option>
      </select>
      <button onclick="searchStudents()">Search</button>
    </div>

    <div class="filters">
      <button class="filter-btn active" onclick="filterByRole('all', event)">👥 Everyone</button>
      <button class="filter-btn" onclick="filterByRole('international', event)">🌍 International</button>
      <button class="filter-btn" onclick="filterByRole('local', event)">📍 Local</button>
    </div>

    <div class="students-grid" id="studentsGrid">
      <div class="loading">Loading awesome people...</div>
    </div>
  </main>

  <script src="api.js"></script>
  <script>
    let allStudents = [];
    let filteredStudents = [];
    const activeFilters = {
      role: 'all',
      country: 'all',
      department: 'all',
      query: '',
    };

    // Check login status and navigation
    window.addEventListener('load', async () => {
      const suggestionsLink = document.getElementById('suggestionsLink');
      const messagesLink = document.getElementById('messagesLink');
      const profileLink = document.getElementById('profileLink');
      const loginBtn = document.getElementById('loginBtn');
      const logoutBtn = document.getElementById('logoutBtn');

      if (isUserLoggedIn()) {
        if (suggestionsLink) suggestionsLink.style.display = 'block';
        if (messagesLink) messagesLink.style.display = 'block';
        profileLink.style.display = 'block';
        loginBtn.style.display = 'none';
        logoutBtn.style.display = 'block';
      }

      logoutBtn.addEventListener('click', (e) => {
        e.preventDefault();
        logoutUser();
        window.location.href = 'index.html';
      });

      // Populate filter dropdowns immediately (exact-only preset lists)
      // so they show even if the API fails or the backend is down.
      populateFilterOptions();

      // Load all students
      await loadStudents();
    });

    async function loadStudents() {
      try {
        const students = await apiCall('/profile/all', 'GET');
        if (!Array.isArray(students)) {
          throw new Error('Unexpected response while loading students');
        }

        // Show all students (they all have profiles)
        allStudents = students;
        applyFilters();
        displayStudents();
      } catch (error) {
        console.error('Error loading students:', error);
        allStudents = [];
        filteredStudents = [];
        document.getElementById('studentsGrid').innerHTML = '<div class="no-students">😅 Oops! We couldn\'t load students. Try again!</div>';
      }
    }

    function normalizeString(value) {
      return (value ?? '').toString().trim().toLowerCase();
    }

    function getStudentCountry(student) {
      return student?.profile?.country || '';
    }

    function getStudentDepartment(student) {
      return student?.department || '';
    }

    function populateFilterOptions() {
      const countrySelect = document.getElementById('countryFilter');
      const deptSelect = document.getElementById('departmentFilter');
      if (!countrySelect || !deptSelect) return;

      // Preset lists ensure users can filter even if there are currently
      // no students from a given country/department in the dataset.
      // Keep in sync with the Registration form country list.
      const presetCountries = [
        'Canada',
        'United States',
        'United Kingdom',
        'Australia',
        'France',
        'Germany',
        'Spain',
        'Italy',
        'India',
        'China',
        'Japan',
        'South Korea',
        'Vietnam',
        'Philippines',
        'Pakistan',
        'Bangladesh',
        'Nigeria',
        'Ghana',
        'Kenya',
        'South Africa',
        'Egypt',
        'Mexico',
        'Brazil',
        'Turkey',
        'Saudi Arabia',
        'United Arab Emirates',
      ];

      // Keep in sync with the Registration form department list.
      const presetDepartments = [
        'Computer Science',
        'Data Science',
        'Information Technology',
        'Engineering',
        'Business Administration',
        'Economics',
        'Psychology',
        'Biology',
        'Chemistry',
        'Physics',
        'Mathematics',
        'Environmental Science',
        'Nursing',
        'Education',
        'Political Science',
        'Sociology',
        'History',
        'English',
        'Philosophy',
        'Fine Arts',
        'Music',
        'Kinesiology',
      ];

      // Exact-only lists: do not add values from the student dataset.
      const countries = presetCountries
        .map(v => (v ?? '').toString().trim())
        .filter(Boolean)
        .filter((v, idx, arr) => arr.indexOf(v) === idx)
        .sort((a, b) => a.localeCompare(b));

      const departments = presetDepartments
        .map(v => (v ?? '').toString().trim())
        .filter(Boolean)
        .filter((v, idx, arr) => arr.indexOf(v) === idx)
        .sort((a, b) => a.localeCompare(b));

      countrySelect.innerHTML = '<option value="all">🌎 All Countries</option>' +
        countries.map(c => `<option value="${c.replace(/"/g, '&quot;')}">${c}</option>`).join('');

      deptSelect.innerHTML = '<option value="all">🏫 All Departments</option>' +
        departments.map(d => `<option value="${d.replace(/"/g, '&quot;')}">${d}</option>`).join('');

      countrySelect.addEventListener('change', () => {
        activeFilters.country = countrySelect.value;
        applyFilters();
        displayStudents();
      });

      deptSelect.addEventListener('change', () => {
        activeFilters.department = deptSelect.value;
        applyFilters();
        displayStudents();
      });
    }

    function applyFilters() {
      const role = activeFilters.role;
      const country = activeFilters.country;
      const department = activeFilters.department;
      const query = normalizeString(activeFilters.query);

      filteredStudents = allStudents.filter(student => {
        if (role !== 'all' && student.role !== role) return false;

        const studentCountry = getStudentCountry(student);
        if (country !== 'all' && studentCountry !== country) return false;

        const studentDepartment = getStudentDepartment(student);
        if (department !== 'all' && studentDepartment !== department) return false;

        if (!query) return true;

        const haystacks = [
          student.fullName,
          studentDepartment,
          studentCountry,
        ].filter(Boolean).map(normalizeString);

        const anyInLists = (arr) => Array.isArray(arr) && arr.some(v => normalizeString(v).includes(query));

        return (
          haystacks.some(h => h.includes(query)) ||
          anyInLists(student.profile?.interests) ||
          anyInLists(student.profile?.hobbies) ||
          anyInLists(student.profile?.languages)
        );
      });
    }

    function displayStudents() {
      const grid = document.getElementById('studentsGrid');

      if (filteredStudents.length === 0) {
        grid.innerHTML = '<div class="no-students">😔 No students found with that filter</div>';
        return;
      }

      grid.innerHTML = filteredStudents.map(student => `
        <div class="student-card" onclick="viewStudent('${student._id}')">
          <img src="${student.profile?.photo || 'https://via.placeholder.com/120'}" alt="${student.fullName}" class="student-photo">
          <div class="student-name">${student.fullName}</div>
          <div class="student-role">${student.role === 'international' ? 'From elsewhere' : 'Local legend'}</div>
          
          ${student.department ? `<div class="student-info"><strong>Department:</strong> ${student.department}</div>` : ''}
          ${student.profile?.year ? `<div class="student-info"><strong>Year:</strong> ${student.profile.year}</div>` : ''}
          ${student.profile?.country ? `<div class="student-info"><strong>From:</strong> ${student.profile.country}</div>` : ''}
          ${student.profile?.languages?.length ? `<div class="student-info"><strong>Languages:</strong> ${student.profile.languages.join(', ')}</div>` : ''}
          
          <div class="student-interests">
            ${student.profile?.interests?.slice(0, 4).map(i => `<span class="interest-tag">${i}</span>`).join('') || '<span style="color:#999;">Getting to know them...</span>'}
          </div>

          <button class="view-btn">Check Them Out →</button>
        </div>
      `).join('');
    }

    function viewStudent(studentId) {
      window.location.href = `student-detail.html?id=${studentId}`;
    }

    function filterByRole(role, evt) {
      activeFilters.role = role;

      // Update button states
      document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
      if (evt && evt.target) evt.target.classList.add('active');

      applyFilters();
      displayStudents();
    }

    function searchStudents() {
      activeFilters.query = document.getElementById('searchInput').value;
      applyFilters();
      displayStudents();
    }

    // Search on Enter key
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('searchInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') searchStudents();
      });
    });
  </script>
</body>

</html>
