<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard | Acadia Connect</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .admin-dashboard {
      max-width: 1400px;
      margin: 140px auto 60px;
      padding: 30px;
    }

    .admin-dashboard h1 {
      color: #fff;
      font-size: 2.2em;
      margin-bottom: 30px;
      font-weight: 700;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }

    .stat-card {
      background: rgba(255, 255, 255, 0.95);
      border-radius: 12px;
      padding: 30px;
      box-shadow: 0 6px 20px rgba(102, 126, 234, 0.15);
      border: 1px solid rgba(102, 126, 234, 0.1);
    }

    .stat-card h3 {
      color: #888;
      font-size: 0.9em;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 10px;
      font-weight: 600;
    }

    .stat-value {
      color: #667eea;
      font-size: 2.5em;
      font-weight: 700;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .admin-controls {
      background: rgba(255, 255, 255, 0.95);
      border-radius: 12px;
      padding: 25px;
      box-shadow: 0 6px 20px rgba(102, 126, 234, 0.15);
      margin-bottom: 30px;
      border: 1px solid rgba(102, 126, 234, 0.1);
    }

    .controls-header {
      display: flex;
      gap: 15px;
      margin-bottom: 20px;
      flex-wrap: wrap;
      align-items: center;
    }

    .search-box {
      flex: 1;
      min-width: 250px;
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 0.95em;
      transition: all 0.3s;
    }

    .search-box:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .btn-add-user {
      padding: 12px 28px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s;
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.25);
    }

    .btn-add-user:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(102, 126, 234, 0.35);
    }

    .users-table {
      width: 100%;
      border-collapse: collapse;
      background: rgba(255, 255, 255, 0.95);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 6px 20px rgba(102, 126, 234, 0.15);
      border: 1px solid rgba(102, 126, 234, 0.1);
    }

    .users-table thead {
      background: linear-gradient(135deg, rgba(102, 126, 234, 0.08) 0%, rgba(118, 75, 162, 0.08) 100%);
    }

    .users-table th {
      padding: 18px;
      text-align: left;
      font-weight: 700;
      color: #667eea;
      border-bottom: 2px solid #f0f0f0;
      text-transform: uppercase;
      font-size: 0.85em;
      letter-spacing: 0.5px;
    }

    .users-table td {
      padding: 16px 18px;
      border-bottom: 1px solid #f5f5f5;
      color: #333;
    }

    .users-table tr:hover {
      background: linear-gradient(135deg, #f8f8ff 0%, #f5f5ff 100%);
    }

    .user-name {
      font-weight: 600;
      color: #333;
    }

    .user-email {
      color: #888;
      font-size: 0.9em;
    }

    .role-badge {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 0.8em;
      font-weight: 600;
      background: linear-gradient(135deg, #f0f0ff 0%, #f5f5ff 100%);
      color: #667eea;
      border: 1px solid #d0c7ff;
    }

    .admin-badge {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 0.8em;
      font-weight: 600;
      background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
      color: #92400e;
      border: 1px solid #fcd34d;
    }

    .user-badge {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 0.8em;
      font-weight: 600;
      background: linear-gradient(135deg, #dbeafe 0%, #bfdbfe 100%);
      color: #1e40af;
      border: 1px solid #93c5fd;
    }

    .action-buttons {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .btn-edit,
    .btn-delete,
    .btn-admin-toggle {
      padding: 8px 14px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.8em;
      font-weight: 600;
      transition: all 0.3s;
    }

    .btn-edit {
      background: #667eea;
      color: #fff;
      box-shadow: 0 2px 6px rgba(102, 126, 234, 0.2);
    }

    .btn-edit:hover {
      background: #764ba2;
      transform: translateY(-2px);
      box-shadow: 0 4px 10px rgba(102, 126, 234, 0.25);
    }

    .btn-delete {
      background: #f87171;
      color: #fff;
      box-shadow: 0 2px 6px rgba(248, 113, 113, 0.2);
    }

    .btn-delete:hover {
      background: #dc2626;
      transform: translateY(-2px);
      box-shadow: 0 4px 10px rgba(248, 113, 113, 0.25);
    }

    .btn-admin-toggle {
      background: #fbbf24;
      color: #78350f;
      box-shadow: 0 2px 6px rgba(251, 191, 36, 0.2);
    }

    .btn-admin-toggle:hover {
      background: #f59e0b;
      transform: translateY(-2px);
      box-shadow: 0 4px 10px rgba(251, 191, 36, 0.25);
    }

    .btn-admin-toggle.remove {
      background: #6b7280;
      color: #fff;
    }

    .btn-admin-toggle.remove:hover {
      background: #4b5563;
    }

    /* Modal styles */
    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.5);
    }

    .modal.show {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .modal-content {
      background: rgba(255, 255, 255, 0.98);
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3);
      max-width: 500px;
      width: 90%;
      border: 1px solid rgba(102, 126, 234, 0.1);
    }

    .modal-content h2 {
      color: #667eea;
      margin-bottom: 25px;
      font-size: 1.8em;
    }

    .form-group-modal {
      margin-bottom: 20px;
    }

    .form-group-modal label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #333;
    }

    .form-group-modal input,
    .form-group-modal select {
      width: 100%;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 6px;
      font-size: 0.95em;
      transition: all 0.3s;
      font-family: 'Poppins', sans-serif;
    }

    .form-group-modal input:focus,
    .form-group-modal select:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .modal-buttons {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
      margin-top: 30px;
    }

    .btn-save,
    .btn-cancel {
      padding: 12px 28px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s;
    }

    .btn-save {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.25);
    }

    .btn-save:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(102, 126, 234, 0.35);
    }

    .btn-cancel {
      background: #e5e7eb;
      color: #333;
    }

    .btn-cancel:hover {
      background: #d1d5db;
    }

    .loading {
      text-align: center;
      color: #fff;
      font-size: 1.1em;
      padding: 40px;
    }

    .error-msg {
      background: #fee2e2;
      color: #991b1b;
      padding: 15px;
      border-radius: 6px;
      margin-bottom: 20px;
      border: 1px solid #fecaca;
    }

    .success-msg {
      background: #dcfce7;
      color: #166534;
      padding: 15px;
      border-radius: 6px;
      margin-bottom: 20px;
      border: 1px solid #bbf7d0;
    }

    @media (max-width: 900px) {
      .users-table {
        font-size: 0.9em;
      }

      .users-table th,
      .users-table td {
        padding: 12px;
      }

      .btn-edit,
      .btn-delete,
      .btn-admin-toggle {
        padding: 6px 10px;
        font-size: 0.75em;
      }

      .action-buttons {
        flex-direction: column;
      }
    }
  </style>
</head>

<body class="page-home">

  <header>
    <h2 class="logo">Acadia Connect</h2>
    <nav class="navigation">
      <a href="home.html">Home</a>
      <a href="browse-students.html">Find Students</a>
      <a href="profile.html" id="profileLink">My Profile</a>
      <a href="#" id="logoutBtn">Logout</a>
    </nav>
  </header>

  <div class="admin-dashboard">
    <h1>📊 Admin Dashboard</h1>

    <div id="messageContainer"></div>

    <!-- Statistics -->
    <div class="stats-grid">
      <div class="stat-card">
        <h3>Total Users</h3>
        <div class="stat-value" id="totalUsersCount">0</div>
      </div>
      <div class="stat-card">
        <h3>Admin Users</h3>
        <div class="stat-value" id="adminUsersCount">0</div>
      </div>
      <div class="stat-card">
        <h3>International Students</h3>
        <div class="stat-value" id="internationalCount">0</div>
      </div>
      <div class="stat-card">
        <h3>Local Students</h3>
        <div class="stat-value" id="localCount">0</div>
      </div>
    </div>

    <!-- Controls -->
    <div class="admin-controls">
      <div class="controls-header">
        <input type="text" id="searchInput" class="search-box" placeholder="Search by name or email...">
        <button class="btn-add-user" onclick="openAddUserModal()">+ Add New User</button>
      </div>
    </div>

    <!-- Users Table -->
    <div id="usersContainer">
      <div class="loading">Loading users...</div>
    </div>
  </div>

  <!-- Add/Edit User Modal -->
  <div id="userModal" class="modal">
    <div class="modal-content">
      <h2 id="modalTitle">Add New User</h2>
      <form id="userForm">
        <div class="form-group-modal">
          <label for="userFullName">Full Name</label>
          <input type="text" id="userFullName" required>
        </div>
        <div class="form-group-modal">
          <label for="userEmail">Email</label>
          <input type="email" id="userEmail" required>
        </div>
        <div class="form-group-modal">
          <label for="userRole">Role</label>
          <select id="userRole" required>
            <option value="international">International Student</option>
            <option value="local">Local Student</option>
          </select>
        </div>
        <div class="form-group-modal">
          <label for="userPassword">Password</label>
          <input type="password" id="userPassword" required>
        </div>
        <div class="form-group-modal">
          <label for="userIsAdmin">
            <input type="checkbox" id="userIsAdmin"> Make Admin
          </label>
        </div>
        <div class="modal-buttons">
          <button type="button" class="btn-cancel" onclick="closeUserModal()">Cancel</button>
          <button type="submit" class="btn-save">Save User</button>
        </div>
      </form>
    </div>
  </div>

  <script src="api.js"></script>
  <script>
    let allUsers = [];
    let editingUserId = null;

    // Check if user is logged in and is admin
    window.addEventListener('load', async () => {
      if (!isUserLoggedIn()) {
        window.location.href = 'index.html';
        return;
      }

      try {
        const user = JSON.parse(localStorage.getItem('user'));
        // For now, we'll assume the first registered user is admin (you should add a proper check)
        // In production, you'd check user.isAdmin from the backend response
        
        // Load dashboard data
        await loadStats();
        await loadUsers();
      } catch (error) {
        showMessage('Error loading dashboard', 'error');
      }
    });

    // Load statistics
    async function loadStats() {
      try {
        const stats = await getAdminStats();
        document.getElementById('totalUsersCount').textContent = stats.totalUsers;
        document.getElementById('adminUsersCount').textContent = stats.adminUsers;
        document.getElementById('internationalCount').textContent = stats.internationalStudents;
        document.getElementById('localCount').textContent = stats.localStudents;
      } catch (error) {
        console.error('Error loading stats:', error);
      }
    }

    // Load all users
    async function loadUsers() {
      try {
        allUsers = await getAllUsers();
        renderUsers(allUsers);
      } catch (error) {
        showMessage('Error loading users: ' + error.message, 'error');
      }
    }

    // Render users table
    function renderUsers(users) {
      const container = document.getElementById('usersContainer');
      
      if (users.length === 0) {
        container.innerHTML = '<p class="loading">No users found</p>';
        return;
      }

      const tableHTML = `
        <table class="users-table">
          <thead>
            <tr>
              <th>Name</th>
              <th>Email</th>
              <th>Role</th>
              <th>Status</th>
              <th>Joined</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            ${users.map(user => `
              <tr>
                <td>
                  <div class="user-name">${user.fullName}</div>
                </td>
                <td>
                  <div class="user-email">${user.email}</div>
                </td>
                <td>
                  <span class="role-badge">${user.role === 'international' ? '🌍 International' : '📍 Local'}</span>
                </td>
                <td>
                  ${user.isAdmin ? '<span class="admin-badge">👑 Admin</span>' : '<span class="user-badge">User</span>'}
                </td>
                <td>${new Date(user.createdAt).toLocaleDateString()}</td>
                <td>
                  <div class="action-buttons">
                    <button class="btn-edit" onclick="openEditUserModal('${user._id}')">Edit</button>
                    <button class="btn-admin-toggle ${user.isAdmin ? 'remove' : ''}" onclick="toggleAdmin('${user._id}', ${user.isAdmin})">
                      ${user.isAdmin ? 'Revoke Admin' : 'Make Admin'}
                    </button>
                    <button class="btn-delete" onclick="confirmDelete('${user._id}', '${user.fullName}')">Delete</button>
                  </div>
                </td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
      
      container.innerHTML = tableHTML;
    }

    // Search functionality
    document.getElementById('searchInput').addEventListener('input', (e) => {
      const query = e.target.value.toLowerCase();
      const filtered = allUsers.filter(user => 
        user.fullName.toLowerCase().includes(query) || 
        user.email.toLowerCase().includes(query)
      );
      renderUsers(filtered);
    });

    // Open add user modal
    function openAddUserModal() {
      editingUserId = null;
      document.getElementById('modalTitle').textContent = 'Add New User';
      document.getElementById('userForm').reset();
      document.getElementById('userPassword').required = true;
      document.getElementById('userModal').classList.add('show');
    }

    // Open edit user modal
    async function openEditUserModal(userId) {
      try {
        const user = await getUserById(userId);
        editingUserId = userId;
        
        document.getElementById('modalTitle').textContent = 'Edit User';
        document.getElementById('userFullName').value = user.fullName;
        document.getElementById('userEmail').value = user.email;
        document.getElementById('userRole').value = user.role;
        document.getElementById('userPassword').value = '';
        document.getElementById('userPassword').required = false;
        document.getElementById('userIsAdmin').checked = user.isAdmin;
        
        document.getElementById('userModal').classList.add('show');
      } catch (error) {
        showMessage('Error loading user: ' + error.message, 'error');
      }
    }

    // Close modal
    function closeUserModal() {
      document.getElementById('userModal').classList.remove('show');
    }

    // Save user (create or update)
    document.getElementById('userForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const userData = {
        fullName: document.getElementById('userFullName').value,
        email: document.getElementById('userEmail').value,
        role: document.getElementById('userRole').value,
        isAdmin: document.getElementById('userIsAdmin').checked,
      };

      const password = document.getElementById('userPassword').value;
      if (password) {
        userData.password = password;
      }

      try {
        if (editingUserId) {
          await updateUser(editingUserId, userData);
          showMessage('User updated successfully', 'success');
        } else {
          userData.password = password || 'defaultPassword123!';
          await apiCall('/auth/register', 'POST', userData);
          showMessage('User created successfully', 'success');
        }

        closeUserModal();
        await loadUsers();
        await loadStats();
      } catch (error) {
        showMessage('Error saving user: ' + error.message, 'error');
      }
    });

    // Toggle admin status
    async function toggleAdmin(userId, isCurrentlyAdmin) {
      try {
        if (isCurrentlyAdmin) {
          await removeUserAdmin(userId);
          showMessage('Admin status removed', 'success');
        } else {
          await makeUserAdmin(userId);
          showMessage('User promoted to admin', 'success');
        }
        await loadUsers();
        await loadStats();
      } catch (error) {
        showMessage('Error updating admin status: ' + error.message, 'error');
      }
    }

    // Delete user with confirmation
    function confirmDelete(userId, userName) {
      if (confirm(`Are you sure you want to delete ${userName}? This action cannot be undone.`)) {
        deleteUserConfirmed(userId);
      }
    }

    async function deleteUserConfirmed(userId) {
      try {
        await deleteUser(userId);
        showMessage('User deleted successfully', 'success');
        await loadUsers();
        await loadStats();
      } catch (error) {
        showMessage('Error deleting user: ' + error.message, 'error');
      }
    }

    // Show message
    function showMessage(message, type) {
      const container = document.getElementById('messageContainer');
      const msgClass = type === 'success' ? 'success-msg' : 'error-msg';
      container.innerHTML = `<div class="${msgClass}">${message}</div>`;
      
      if (type === 'success') {
        setTimeout(() => {
          container.innerHTML = '';
        }, 3000);
      }
    }

    // Logout
    document.getElementById('logoutBtn').addEventListener('click', (e) => {
      e.preventDefault();
      logoutUser();
      window.location.href = 'index.html';
    });
  </script>

</body>
</html>
