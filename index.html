<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AcadiaConnect | Login</title>
  <link rel="stylesheet" href="style.css">
</head>

<body class="page-auth">

  <header>
    <h2 class="logo">Acadia Connect</h2>
    <nav class="navigation">
      <a href="home.html">Home</a>
      <a href="browse-students.html">Find Students</a>
      <a href="resources.html">Resources</a>
      <a href="about.html">About</a>
      <a href="profile.html" id="profileLink" style="display:none;">My Profile</a>
    </nav>
  </header>

  <div class="wrapper">
    <!-- LOGIN -->
    <div class="form-box login">
      <h2>Login</h2>
      <form action="#">
        <div class="input-box">
          <span class="icon">
            <ion-icon name="mail"></ion-icon>
          </span>
          <input type="email" name="email" required>
          <label>Email</label>
        </div>

        <div class="input-box">
          <input type="password" name="password" required>
          <label>Password</label>
        </div>

        <div class="remember-forgot">
          <label><input type="checkbox"> Remember me</label>
          <a href="#">Forgot Password?</a>
        </div>

        <button type="submit" class="btn">Login</button>

        <div class="login-register">
          <p>
            Don't have an account?
            <a href="#" class="register-link">Register</a>
          </p>
        </div>
      </form>
    </div>

    <!-- REGISTER -->
    <div class="form-box register">
      <h2>Registration</h2>
      <form action="#">
        <div class="input-box">
          <span class="icon">
            <ion-icon name="person"></ion-icon>
          </span>
          <input type="text" name="fullName" required>
          <label>Full Name</label>
        </div>

        <div class="input-box">
          <span class="icon">
            <ion-icon name="mail"></ion-icon>
          </span>
          <input type="email" name="email" required>
          <label>Email</label>
        </div>

        <div class="input-box">
          <span class="icon">
            <ion-icon name="people"></ion-icon>
          </span>
          <select name="role" required>
            <option value="" disabled selected></option>
            <option value="international">International Student</option>
            <option value="local">Local Student</option>
          </select>
          <label>Role</label>
        </div>

        <div class="input-box">
          <input type="password" name="password" required>
          <label>Password</label>
        </div>

        <div class="remember-forgot">
          <label>
            <input type="checkbox">
            I agree to the terms & conditions
          </label>
        </div>

        <button type="submit" class="btn">Register</button>

        <div class="login-register">
          <p>
            Already have an account?
            <a href="#" class="login-link">Login</a>
          </p>
        </div>
      </form>
    </div>
  </div>

  <script src="api.js"></script>
  <script src="script.js"></script>
  <script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"></script>

</body>
</html>
