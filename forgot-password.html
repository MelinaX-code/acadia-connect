<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AcadiaConnect | Forgot Password</title>
  <link rel="stylesheet" href="style.css">
</head>

<body class="page-auth">

  <header>
    <h2 class="logo">Acadia Connect</h2>
    <nav class="navigation">
      <a href="browse-students.html">Find Students</a>
      <a href="resources.html">Resources</a>
      <a href="about.html">About</a>
      <a href="profile.html" id="profileLink" style="display:none;">My Profile</a>
    </nav>
  </header>

  <div class="wrapper">
    <div class="form-box login">
      <h2>Reset Password</h2>
      <form id="forgotPasswordForm" action="#" novalidate>
        <div class="input-box">
          <span class="icon">
            <ion-icon name="mail"></ion-icon>
          </span>
          <input type="email" name="email" required>
          <label>Email</label>
        </div>

        <button type="submit" class="btn">Send reset link</button>

        <div class="login-register">
          <p>
            Remembered your password?
            <a href="login.html" class="register-link">Back to Login</a>
          </p>
        </div>
      </form>
    </div>
  </div>

  <script src="api.js"></script>
  <script src="script.js"></script>
  <script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"></script>

</body>

</html>
