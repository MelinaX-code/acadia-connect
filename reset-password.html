<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AcadiaConnect | Set New Password</title>
  <link rel="stylesheet" href="style.css">
</head>

<body class="page-auth">

  <header>
    <h2 class="logo">Acadia Connect</h2>
    <nav class="navigation">
      <a href="browse-students.html">Find Students</a>
      <a href="resources.html">Resources</a>
      <a href="about.html">About</a>
      <a href="profile.html" id="profileLink" style="display:none;">My Profile</a>
    </nav>
  </header>

  <div class="wrapper">
    <div class="form-box login">
      <h2>Set New Password</h2>
      <form id="resetPasswordForm" action="#" novalidate>
        <input type="hidden" name="token" value="">

        <div class="input-box">
          <input type="password" name="password" required>
          <label>New Password</label>
        </div>

        <div class="input-box">
          <input type="password" name="confirmPassword" required>
          <label>Confirm Password</label>
        </div>

        <button type="submit" class="btn">Update password</button>

        <div class="login-register">
          <p>
            <a href="login.html" class="register-link">Back to Login</a>
          </p>
        </div>
      </form>
    </div>
  </div>

  <script src="api.js"></script>
  <script src="script.js"></script>
  <script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"></script>

</body>

</html>
